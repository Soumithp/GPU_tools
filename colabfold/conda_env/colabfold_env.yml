name: colabfold_env
channels:
  - conda-forge
  - bioconda
  - pytorch
  - nvidia
dependencies:
  - python=3.10
  - pytorch>=2.1.0
  - openmm
  - pdbfixer
  - kalign2
  - hhsuite
  - mmseqs2
  - numpy
  - scipy
  - matplotlib
  - biopython
  - pip
  - pip:
    - "colabfold[alphafold] @ git+https://github.com/sokrypton/ColabFold"
    - py3Dmol